<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Planer obroka • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
<body>
  <div id="menuBackdrop" class="menu-backdrop"></div>
  <nav id="hamburgerNav" class="hamburger-nav">
    <button id="hamburgerBtn" class="hamburger-btn" aria-label="Meni"><span></span><span></span><span></span></button>
    <div id="hamburgerMenu" class="hamburger-menu">
      <ul>
        <li><a class="menu-item" href="index.html"><span class="material-icons">home</span> Home</a></li>
        <li><button id="darkToggle" class="menu-item" type="button"><span class="material-icons">brightness_6</span> Dark Mode</button></li>
        <li><a class="menu-item" href="add-recipe.html"><span class="material-icons">add</span> Dodaj recept</a></li>
        <li><a class="menu-item" href="about.html"><span class="material-icons">info</span> O aplikaciji</a></li>
      </ul>
    </div>
  </nav>

  <main class="container greenhouse-shell py-4">
    <p class="page-kicker">Weekly Schedule</p>
    <h1>Weekly Meal Plan</h1>
    <p class="page-subtitle">Kreiraj nutritivno balansiran plan za celu nedelju i odmah izvezi listu za kupovinu.</p>

    <section class="greenhouse-section">
      <div class="hero-actions mb-3">
        <button class="btn btn-success" onclick="saveMealPlan()">Save Meal Plan</button>
        <button class="btn btn-outline-secondary" onclick="generateShoppingList()">Generate Shopping List</button>
      </div>
      <div class="table-responsive">
        <table class="table align-middle text-center">
          <thead>
            <tr>
              <th>Dan</th>
              <th>Doručak</th>
              <th>Ručak</th>
              <th>Večera</th>
            </tr>
          </thead>
          <tbody id="mealPlanTable"></tbody>
        </table>
      </div>
      <p class="mt-3 text-success d-none" id="saveMessage">✅ Plan sačuvan!</p>
    </section>
  </main>

  <footer class="footer">PEKI &amp; SAKI • SMART MEAL PLANNER</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/meal-plan.js"></script>
  <script src="js/main.js"></script>
  <script src="js/hamburger.js"></script>
</body>
</html>
