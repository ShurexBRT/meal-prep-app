<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Recepti • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="menuBackdrop" class="menu-backdrop"></div>
  <nav id="hamburgerNav" class="hamburger-nav">
    <button id="hamburgerBtn" class="hamburger-btn" aria-label="Meni">
      <span></span><span></span><span></span>
    </button>
    <div id="hamburgerMenu" class="hamburger-menu">
      <ul>
        <li><a class="menu-item" href="index.html"><span class="material-icons">home</span> Home</a></li>
        <li><button id="darkToggle" class="menu-item" type="button"><span class="material-icons">brightness_6</span> Dark Mode</button></li>
        <li><a class="menu-item" href="add-recipe.html"><span class="material-icons">add</span> Dodaj recept</a></li>
        <li><a class="menu-item" href="about.html"><span class="material-icons">info</span> O aplikaciji</a></li>
      </ul>
    </div>
  </nav>

  <main class="container greenhouse-shell py-4">
    <p class="page-kicker">Curated Collection</p>
    <h1>Your Recipes</h1>
    <p class="page-subtitle">Pretraži kolekciju, filtriraj po obroku/cilju i pronađi recepte koje možeš spremiti iz trenutnog inventara.</p>

    <div class="greenhouse-section stack-gap-lg">
      <div class="hero-actions">
        <a href="add-recipe.html" class="btn btn-success">+ Create New Recipe</a>
      </div>
      <input type="search" id="searchInput" class="form-control" placeholder="Search ingredients or dish names..." />
      <div class="row g-2">
        <div class="col-sm-6">
          <select id="mealFilter" class="form-select">
            <option value="">All Meal Types</option>
            <option value="doručak">Doručak</option>
            <option value="ručak">Ručak</option>
            <option value="večera">Večera</option>
          </select>
        </div>
        <div class="col-sm-6">
          <select id="goalFilter" class="form-select">
            <option value="">Any Goal</option>
            <option value="gubitak">Gubitak</option>
            <option value="odrzavanje">Održavanje</option>
          </select>
        </div>
      </div>
      <div class="form-check m-0">
        <input class="form-check-input" type="checkbox" id="filterByInventory" />
        <label class="form-check-label" for="filterByInventory">Show only recipes I can make now</label>
      </div>
    </div>

    <div id="recipeList" class="row"></div>
  </main>

  <footer class="footer">PEKI &amp; SAKI • SMART MEAL PLANNER</footer>

  <script src="js/recipes.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/hamburger.js"></script>
</body>
</html>
