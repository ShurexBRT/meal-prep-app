<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <title>Dodaj recept • Smart Meal Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="menuBackdrop" class="menu-backdrop"></div>
    <nav id="hamburgerNav" class="hamburger-nav">
        <button id="hamburgerBtn" class="hamburger-btn" aria-label="Meni"><span></span><span></span><span></span></button>
        <div id="hamburgerMenu" class="hamburger-menu">
            <ul>
                <li><a class="menu-item" href="index.html"><span class="material-icons">home</span> Home</a></li>
                <li><button id="darkToggle" class="menu-item" type="button"><span class="material-icons">brightness_6</span> Dark Mode</button></li>
                <li><a class="menu-item" href="add-recipe.html"><span class="material-icons">add</span> Dodaj recept</a></li>
                <li><a class="menu-item" href="about.html"><span class="material-icons">info</span> O aplikaciji</a></li>
            </ul>
        </div>
    </nav>

    <main class="container greenhouse-shell py-4" style="max-width:640px;">
        <p class="page-kicker">Creation Studio</p>
        <h1>Add a New Recipe</h1>
        <p class="page-subtitle">Unesi detalje recepta i dodaj ga u svoju kuriranu kolekciju za planiranje obroka.</p>

        <form id="addRecipeForm" autocomplete="off" class="greenhouse-section stack-gap-lg">
            <div>
                <label for="name" class="form-label">Recipe Name</label>
                <input type="text" class="form-control" id="name" name="name" required maxlength="60" />
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="meal" class="form-label">Meal Type</label>
                    <select class="form-select" id="meal" name="meal" required>
                        <option value="">Izaberi</option>
                        <option value="doručak">Doručak</option>
                        <option value="ručak">Ručak</option>
                        <option value="večera">Večera</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="goal" class="form-label">Goal</label>
                    <select class="form-select" id="goal" name="goal" required>
                        <option value="">Izaberi</option>
                        <option value="gubitak">Gubitak</option>
                        <option value="odrzavanje">Održavanje</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3" maxlength="200" required></textarea>
            </div>
            <div>
                <label for="ingredients" class="form-label">Ingredients (comma separated)</label>
                <input type="text" class="form-control" id="ingredients" name="ingredients" required placeholder="npr. jaja, avokado, so" maxlength="200" />
            </div>
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <label for="calories" class="form-label">Calories</label>
                    <input type="number" class="form-control" id="calories" name="calories" required min="0" />
                </div>
                <div class="col-6 col-md-3">
                    <label for="protein" class="form-label">Protein</label>
                    <input type="number" class="form-control" id="protein" name="protein" required min="0" />
                </div>
                <div class="col-6 col-md-3">
                    <label for="carbs" class="form-label">Carbs</label>
                    <input type="number" class="form-control" id="carbs" name="carbs" required min="0" />
                </div>
                <div class="col-6 col-md-3">
                    <label for="fat" class="form-label">Fat</label>
                    <input type="number" class="form-control" id="fat" name="fat" required min="0" />
                </div>
            </div>
            <div class="hero-actions pt-1">
                <button type="submit" class="btn btn-success"><span class="material-icons align-middle" style="font-size:1.1em;">save</span> Save Recipe</button>
                <a href="recipes.html" class="btn btn-outline-secondary">Discard</a>
            </div>
        </form>
        <div id="toastContainer"></div>
    </main>

    <footer class="footer">PEKI &amp; SAKI • SMART MEAL PLANNER</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/add-recipe.js"></script>
    <script src="js/hamburger.js"></script>
</body>
</html>
