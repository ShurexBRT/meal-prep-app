<!DOCTYPE html>
<html lang="sr">

<head>
  <meta charset="UTF-8" />
  <title>Dodaj recept • Smart Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>

<body>
  <div id="menuBackdrop" class="menu-backdrop"></div>
  <nav id="hamburgerNav" class="hamburger-nav">
    <button id="hamburgerBtn" class="hamburger-btn" aria-label="Meni"><span></span><span></span><span></span></button>
    <div id="hamburgerMenu" class="hamburger-menu">
      <ul>
        <li><a class="menu-item" href="index.html"><span class="material-icons">home</span> Home</a></li>
        <li><button id="darkToggle" class="menu-item" type="button"><span class="material-icons">brightness_6</span> Dark Mode</button></li>
        <li><a class="menu-item" href="add-recipe.html"><span class="material-icons">add</span> Dodaj recept</a></li>
        <li><a class="menu-item" href="about.html"><span class="material-icons">info</span> O aplikaciji</a></li>
      </ul>
    </div>
  </nav>

  <main class="app-main container py-4" style="max-width: 760px;">
    <header class="page-header">
      <span class="page-eyebrow">Recipe Editor</span>
      <h1 class="page-title"><span class="material-icons align-middle">edit_note</span> Dodaj recept</h1>
      <p class="page-subtitle">Unesi novi obrok bez menjanja postojeće logike aplikacije.</p>
    </header>

    <section class="form-shell">
      <form id="addRecipeForm" autocomplete="off">
        <div class="mb-3">
          <label for="name" class="form-label">Naziv recepta</label>
          <input type="text" class="form-control" id="name" name="name" required maxlength="60" />
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="meal" class="form-label">Obrok</label>
            <select class="form-select" id="meal" name="meal" required>
              <option value="">Izaberi</option>
              <option value="doručak">Doručak</option>
              <option value="ručak">Ručak</option>
              <option value="večera">Večera</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="goal" class="form-label">Cilj</label>
            <select class="form-select" id="goal" name="goal" required>
              <option value="">Izaberi</option>
              <option value="gubitak">Gubitak</option>
              <option value="odrzavanje">Održavanje</option>
            </select>
          </div>
        </div>
        <div class="mb-3 mt-3">
          <label for="description" class="form-label">Opis recepta</label>
          <textarea class="form-control" id="description" name="description" rows="2" maxlength="200" required></textarea>
        </div>
        <div class="mb-3">
          <label for="ingredients" class="form-label">Sastojci <span class="text-muted">(odvojiti zarezom)</span></label>
          <input type="text" class="form-control" id="ingredients" name="ingredients" required placeholder="npr. jaja, avokado, so, biber" maxlength="200" />
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6 col-md-3">
            <label for="calories" class="form-label">Kalorije</label>
            <input type="number" class="form-control" id="calories" name="calories" required min="0" />
          </div>
          <div class="col-6 col-md-3">
            <label for="protein" class="form-label">Proteini (g)</label>
            <input type="number" class="form-control" id="protein" name="protein" required min="0" />
          </div>
          <div class="col-6 col-md-3">
            <label for="carbs" class="form-label">UH (g)</label>
            <input type="number" class="form-control" id="carbs" name="carbs" required min="0" />
          </div>
          <div class="col-6 col-md-3">
            <label for="fat" class="form-label">Masti (g)</label>
            <input type="number" class="form-control" id="fat" name="fat" required min="0" />
          </div>
        </div>
        <div class="d-flex flex-wrap gap-2 mt-4">
          <button type="submit" class="btn btn-success flex-grow-1"><span class="material-icons align-middle" style="font-size:1.2em;">save</span> Sačuvaj</button>
          <a href="recipes.html" class="btn btn-outline-secondary flex-grow-1">Odustani</a>
        </div>
      </form>
      <div id="toastContainer"></div>
    </section>
  </main>

  <footer class="footer">🥗 Saki & Peki • Smart Meal Planner</footer>
  <nav class="mobile-nav" aria-label="Glavna navigacija">
    <a href="index.html"><span class="material-icons">home</span>Početna</a>
    <a href="recipes.html" class="active"><span class="material-icons">restaurant_menu</span>Recepti</a>
    <a href="meal-plan.html"><span class="material-icons">calendar_month</span>Plan</a>
    <a href="shopping-list.html"><span class="material-icons">shopping_cart</span>Kupovina</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/add-recipe.js"></script>
  <script src="js/hamburger.js"></script>
</body>

</html>
